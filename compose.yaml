# ============================================
# Wuxia Cultivation Tracker — Docker Compose
# Production-grade deployment for Portainer
# ============================================

services:
  app:
    image: ghcr.io/alex4lifesz-code/wuxia-log:${APP_VERSION:-latest}
    container_name: wuxia-cultivation-tracker
    restart: always
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/data/cultivation.db
      - NEXT_TELEMETRY_DISABLED=1
    volumes:
      - wuxia_data:/app/data
    tmpfs:
      - /tmp:noexec,nosuid,size=64M
    networks:
      - wuxia_network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/checkins"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true
    read_only: true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 120s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
        tag: "wuxia-{{.Name}}"
    labels:
      com.centurylabs.description: "Wuxia Cultivation Workout Tracker"
      com.centurylabs.version: "${APP_VERSION:-2.1.0}"
      com.centurylabs.maintainer: "Century Labs"
      com.centurylabs.environment: "production"

volumes:
  wuxia_data:
    driver: local
    name: wuxia_cultivation_data
    labels:
      com.centurylabs.description: "Persistent SQLite database storage"

networks:
  wuxia_network:
    driver: bridge
    name: wuxia_network
    driver_opts:
      com.docker.network.bridge.enable_icc: "false"
    labels:
      com.centurylabs.description: "Internal application network"
