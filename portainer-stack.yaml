# ============================================
# Wuxia Cultivation Tracker — Portainer Stack
# Production deployment with Portainer agent
# ============================================
#
# Deploy via Portainer UI:
#   Stacks → Add Stack → Upload or paste this file
#   Set environment variables in the Portainer UI
#
# Required environment variables (set in Portainer):
#   APP_PORT       — Host port for the application (default: 3000)
#   APP_VERSION    — Image tag / version label (default: 2.1.0)
# ============================================

services:
  # ── Application ──────────────────────────────
  app:
    image: ghcr.io/alex4lifesz-code/wuxia-log:${APP_VERSION:-2.2.0}
    container_name: wuxia-cultivation-tracker
    restart: always
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/data/cultivation.db
      - NEXT_TELEMETRY_DISABLED=1
    volumes:
      - wuxia_data:/app/data
    tmpfs:
      - /tmp:noexec,nosuid,size=64M
    networks:
      - wuxia_internal
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/api/checkins"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true
    read_only: true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 5
        window: 120s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
        tag: "wuxia-{{.Name}}"
    labels:
      com.centurylabs.description: "Wuxia Cultivation Workout Tracker"
      com.centurylabs.version: "${APP_VERSION:-2.1.0}"
      com.centurylabs.maintainer: "Century Labs"
      com.centurylabs.environment: "production"
      # Portainer metadata
      io.portainer.accesscontrol.teams: "developers"

  # ── Portainer Agent ──────────────────────────
  portainer-agent:
    image: portainer/agent:2.24.1
    container_name: wuxia-portainer-agent
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/volumes:/var/lib/docker/volumes:ro
    ports:
      - "9001:9001"
    networks:
      - wuxia_internal
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 128M
        reservations:
          cpus: "0.1"
          memory: 32M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"
    labels:
      com.centurylabs.description: "Portainer Agent for container management"
      com.centurylabs.environment: "production"

volumes:
  wuxia_data:
    driver: local
    name: wuxia_cultivation_data
    labels:
      com.centurylabs.description: "Persistent SQLite database storage"

networks:
  wuxia_internal:
    driver: bridge
    name: wuxia_internal
    driver_opts:
      com.docker.network.bridge.enable_icc: "false"
    labels:
      com.centurylabs.description: "Internal application network"
